<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArchLearn · 后端架构学习</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    .chat-scroll::-webkit-scrollbar { width: 6px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .typing span { animation: blink 1.4s infinite both; }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
  </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col overflow-hidden">
  <!-- 顶栏 -->
  <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between shrink-0">
    <h1 class="text-xl font-bold text-slate-800">
      <i class="fas fa-cubes text-indigo-600"></i> ArchLearn
    </h1>
    <div class="flex items-center gap-4">
      <span id="user-email" class="text-sm text-slate-500"></span>
      <button id="logout-btn" class="text-sm text-slate-500 hover:text-red-500">
        <i class="fas fa-sign-out-alt"></i> 退出
      </button>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- 左侧:课程地图 + 错题本 -->
    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col overflow-y-auto chat-scroll shrink-0">
      <nav class="p-4">
        <h2 class="text-xs font-semibold text-slate-400 uppercase mb-3">课程地图</h2>
        <ul id="topic-list" class="space-y-1"></ul>
      </nav>
      <section class="p-4 border-t border-slate-200 mt-auto">
        <h2 class="text-xs font-semibold text-slate-400 uppercase mb-3">
          <i class="fas fa-book-medical"></i> 我的薄弱点
        </h2>
        <ul id="error-list" class="space-y-1.5 text-sm text-slate-600">
          <li class="text-slate-400 text-xs">暂无记录,做完作业后这里会显示</li>
        </ul>
      </section>
    </aside>

    <!-- 主区 -->
    <main class="flex-1 flex flex-col overflow-hidden">
      <!-- 主题头 + 模式切换 -->
      <div class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between shrink-0">
        <div>
          <h2 id="topic-title" class="text-lg font-bold text-slate-800">缓存</h2>
          <p id="topic-sub" class="text-xs text-slate-500"></p>
        </div>
        <div class="flex gap-2 bg-slate-100 rounded-lg p-1">
          <button data-mode="learn" class="mode-btn px-4 py-1.5 rounded-md text-sm font-medium bg-white shadow text-indigo-600">
            <i class="fas fa-comments"></i> 学习问答
          </button>
          <button data-mode="practice" class="mode-btn px-4 py-1.5 rounded-md text-sm font-medium text-slate-500">
            <i class="fas fa-pen"></i> 作业练习
          </button>
        </div>
      </div>

      <!-- 学习问答模式 -->
      <section id="learn-panel" class="flex-1 flex flex-col overflow-hidden">
        <div id="chat-box" class="flex-1 overflow-y-auto chat-scroll p-6 space-y-4"></div>
        <div class="border-t border-slate-200 bg-white p-4 shrink-0">
          <div class="flex gap-2 max-w-3xl mx-auto">
            <input id="chat-input" placeholder="说说你的想法,或问我任何架构问题..."
              class="flex-1 px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            <button id="chat-send" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 rounded-lg">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </section>

      <!-- 作业练习模式 -->
      <section id="practice-panel" class="flex-1 overflow-y-auto chat-scroll p-6 hidden">
        <div class="max-w-3xl mx-auto">
          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-600 mb-2">选择作业难度</label>
            <div id="assignment-tabs" class="flex flex-wrap gap-2"></div>
          </div>
          <div id="assignment-card" class="bg-white rounded-xl p-5 shadow-sm border border-slate-200 mb-4 hidden">
            <div class="flex items-center gap-2 mb-2">
              <span id="assignment-level" class="text-xs px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-700"></span>
              <h3 id="assignment-title" class="font-semibold text-slate-800"></h3>
            </div>
            <p id="assignment-prompt" class="text-sm text-slate-600 whitespace-pre-line leading-relaxed"></p>
          </div>
          <div id="answer-area" class="hidden">
            <textarea id="answer-input" rows="8" placeholder="在这里写下你的架构设计方案...(建议按 需求澄清→容量估算→架构→取舍 的思路展开)"
              class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none resize-y"></textarea>
            <button id="submit-answer" class="mt-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-6 py-2.5 rounded-lg">
              <i class="fas fa-clipboard-check"></i> 提交批改
            </button>
          </div>
          <!-- 打分报告 -->
          <div id="report" class="hidden mt-6"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
