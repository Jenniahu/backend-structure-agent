<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArchLearn · 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen flex items-center justify-center p-4">
  <main class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-white mb-2">
        <i class="fas fa-cubes text-indigo-400"></i> ArchLearn
      </h1>
      <p class="text-slate-400">后端架构学习 Agent · 讲解 + 问答 + 作业 + 反馈</p>
    </div>

    <section class="bg-white rounded-2xl shadow-2xl p-8">
      <div class="flex mb-6 border-b border-slate-200">
        <button id="tab-login" class="flex-1 pb-3 font-medium text-indigo-600 border-b-2 border-indigo-600">登录</button>
        <button id="tab-register" class="flex-1 pb-3 font-medium text-slate-400">注册</button>
      </div>

      <form id="auth-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">邮箱</label>
          <input id="email" type="email" required placeholder="you@example.com"
            class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">密码</label>
          <input id="password" type="password" required placeholder="至少 6 位"
            class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
        </div>
        <p id="error-msg" class="text-red-500 text-sm hidden"></p>
        <button type="submit" id="submit-btn"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition">
          登录
        </button>
      </form>
    </section>
    <p class="text-center text-slate-500 text-sm mt-6">学的是架构思维,不是背答案</p>
  </main>

  <script>
    let mode = 'login'
    const $ = (id) => document.getElementById(id)
    const tabLogin = $('tab-login'), tabReg = $('tab-register'), btn = $('submit-btn'), errMsg = $('error-msg')

    function setMode(m) {
      mode = m
      const active = 'flex-1 pb-3 font-medium text-indigo-600 border-b-2 border-indigo-600'
      const inactive = 'flex-1 pb-3 font-medium text-slate-400'
      tabLogin.className = m === 'login' ? active : inactive
      tabReg.className = m === 'register' ? active : inactive
      btn.textContent = m === 'login' ? '登录' : '注册'
      errMsg.classList.add('hidden')
    }
    tabLogin.onclick = () => setMode('login')
    tabReg.onclick = () => setMode('register')

    $('auth-form').onsubmit = async (e) => {
      e.preventDefault()
      errMsg.classList.add('hidden')
      btn.disabled = true
      btn.textContent = '处理中...'
      try {
        const res = await fetch(`/api/auth/${mode}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: $('email').value, password: $('password').value }),
        })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error || '操作失败')
        location.href = '/'
      } catch (err) {
        errMsg.textContent = err.message
        errMsg.classList.remove('hidden')
        btn.disabled = false
        btn.textContent = mode === 'login' ? '登录' : '注册'
      }
    }
  </script>
</body>
</html>
